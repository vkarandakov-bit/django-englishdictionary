{% extends 'dictionary/base.html' %}

{% block title %}EnglishCard — Удалить слово{% endblock %}

{% block content %}
<div class="card shadow-sm border-0">
    <div class="card-body p-4">
        <h1 class="h4 mb-4">Персональное удаление слов</h1>

        {% if not words %}
            <p class="mb-0">У вас нет доступных слов для удаления.</p>
        {% else %}
            <form method="post" class="row g-3">
                {% csrf_token %}
                <div class="col-12">
                    <label class="form-label" for="{{ form.word_key.id_for_label }}">{{ form.word_key.label }}</label>
                    {{ form.word_key }}
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-danger w-100">Удалить выбранное слово</button>
                </div>
            </form>
        {% endif %}
    </div>
</div>
{% endblock %}
