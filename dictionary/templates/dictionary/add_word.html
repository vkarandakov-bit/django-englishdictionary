{% extends 'dictionary/base.html' %}

{% block title %}EnglishCard — Добавить слово{% endblock %}

{% block content %}
<div class="card shadow-sm border-0">
    <div class="card-body p-4">
        <h1 class="h4 mb-4">Пополнение персонального словаря</h1>

        <form method="post" class="row g-3">
            {% csrf_token %}
            <div class="col-md-6">
                <label class="form-label" for="{{ form.russian_word.id_for_label }}">{{ form.russian_word.label }}</label>
                {{ form.russian_word }}
            </div>
            <div class="col-md-6">
                <label class="form-label" for="{{ form.english_word.id_for_label }}">{{ form.english_word.label }}</label>
                {{ form.english_word }}
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary w-100">Сохранить в базу</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
